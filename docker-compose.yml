services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: opposing_counsel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opposing_counsel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    command: /bin/sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - api_storage:/app/storage

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - api_storage:/app/storage

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/schemas:/app/packages/schemas

volumes:
  postgres_data:
  qdrant_data:
  api_storage:
